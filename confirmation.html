<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexDrive — Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
         :root {
            --navy: #050d1f;
            --navy2: #071430;
            --royal: #1440c8;
            --sky: #2d6ef5;
            --bright: #5b8fff;
            --white: #ffffff;
            --silver: rgba(240, 244, 255, 0.75);
            --muted: rgba(240, 244, 255, 0.45);
            --dim: rgba(240, 244, 255, 0.2);
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --white-border: rgba(255, 255, 255, 0.16);
        }
        
        body {
            background: var(--navy);
            color: var(--silver);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .bg-glow {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
        }
        
        .bg-glow-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(20, 64, 200, 0.14) 0%, transparent 70%);
            top: -150px;
            left: -150px;
        }
        
        .bg-glow-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 110, 245, 0.08) 0%, transparent 70%);
            bottom: -80px;
            right: -80px;
        }
        
        nav {
            position: relative;
            z-index: 10;
            padding: 0 64px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 13, 31, 0.9);
            backdrop-filter: blur(24px);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--white-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .logo:hover .logo-icon {
            background: rgba(20, 64, 200, 0.25);
        }
        
        .logo-text {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 6px;
            color: var(--white);
            text-transform: uppercase;
        }
        
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            position: relative;
            z-index: 2;
        }
        
        .confirm-wrap {
            width: 100%;
            max-width: 600px;
        }
        
        .loading {
            text-align: center;
            padding: 80px 0;
            color: var(--dim);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        /* CHECK */
        
        .check-icon {
            width: 72px;
            height: 72px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            animation: scaleIn 0.5s ease both;
        }
        
        .check-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--white);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s ease 0.3s forwards;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0.6);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }
        
        .confirm-header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease 0.2s both;
        }
        
        .confirm-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 20px;
        }
        
        .confirm-eyebrow::before,
        .confirm-eyebrow::after {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--white-border);
        }
        
        .confirm-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--white);
            margin-bottom: 12px;
            line-height: 1.1;
        }
        
        .confirm-title em {
            font-weight: 400;
            font-style: italic;
            background: linear-gradient(135deg, #fff 0%, var(--bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .confirm-email {
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.6;
        }
        
        .confirm-email strong {
            color: var(--white);
            font-weight: 500;
        }
        /* DETAILS BOX */
        
        .details-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 36px;
            margin-bottom: 24px;
            position: relative;
            animation: fadeUp 0.6s ease 0.35s both;
        }
        
        .details-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 32px;
            right: 32px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--white), transparent);
        }
        
        .details-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.6;
        }
        
        .details-label::before {
            content: '';
            display: block;
            width: 16px;
            height: 1px;
            background: currentColor;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-row .key {
            color: var(--muted);
            font-weight: 300;
        }
        
        .detail-row .val {
            color: var(--white);
            font-weight: 500;
            text-align: right;
        }
        
        .detail-row .ref {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--bright);
            font-family: 'DM Sans', monospace;
        }
        
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 24px;
            margin-top: 8px;
            border-top: 1px solid var(--white-border);
        }
        
        .total-row .key {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }
        
        .total-row .amount {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 900;
            color: var(--white);
            line-height: 1;
        }
        
        .total-row .currency {
            font-size: 12px;
            color: var(--dim);
            font-weight: 300;
            margin-left: 6px;
        }
        /* ACTIONS */
        
        .confirm-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeUp 0.6s ease 0.5s both;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--royal), var(--sky));
            color: white;
            text-decoration: none;
            padding: 17px;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.3s;
            display: block;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(20, 64, 200, 0.4);
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--sky), var(--royal));
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn-primary:hover {
            box-shadow: 0 12px 48px rgba(45, 110, 245, 0.5);
            transform: translateY(-1px);
        }
        
        .btn-primary:hover::before {
            opacity: 1;
        }
        
        .btn-primary span {
            position: relative;
            z-index: 1;
        }
        
        .btn-ghost {
            background: rgba(255, 255, 255, 0.04);
            color: var(--silver);
            text-decoration: none;
            padding: 17px;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            border: 1px solid var(--white-border);
            transition: all 0.3s;
            display: block;
        }
        
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--white);
        }
        
        footer {
            position: relative;
            z-index: 10;
            border-top: 1px solid var(--border);
            padding: 24px 64px;
            background: rgba(2, 9, 18, 0.9);
        }
        
        footer p {
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 2px;
            text-align: center;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 600px) {
            nav {
                padding: 0 24px;
            }
            .details-box {
                padding: 24px;
            }
            footer {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 13L4.5 6L9 4L13.5 6L16 13" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="13" r="1.5" stroke="#fff" stroke-width="1.2"/>
          <path d="M5.5 13H12.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
            </div>
            <span class="logo-text">NexDrive</span>
        </a>
    </nav>

    <main>
        <div class="confirm-wrap" id="confirm-wrap">
            <div class="loading">Chargement...</div>
        </div>
    </main>

    <footer>
        <p>© 2026 NexDrive — Québec, Canada</p>
    </footer>

    <script>
        const {
            createClient
        } = supabase
        const db = createClient('https://igftridkkchvjaxtburi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZnRyaWRra2NodmpheHRidXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxMzgsImV4cCI6MjA4ODY2MzEzOH0.SuUO_seWElDPnm3lnGEEn8OwflJhbocyJjVF8nvrf4Y')

        async function loadConfirmation() {
            const params = new URLSearchParams(window.location.search)
            const id = params.get('id')
            const wrap = document.getElementById('confirm-wrap')
            if (!id) {
                window.location.href = 'fleet.html';
                return
            }

            const {
                data: r
            } = await db.from('reservations').select('*, vehicles(*), meetup_points(*)').eq('id', id).single()
            if (!r) {
                window.location.href = 'fleet.html';
                return
            }

            const subtotal = Number(r.subtotal || r.total_price || 0)
            const tps = subtotal * 0.05
            const tvq = subtotal * 0.09975
            const totalTTC = subtotal * 1.14975
            const ref = 'ND-' + r.id.slice(0, 8).toUpperCase()

            wrap.innerHTML = `
        <div class="check-icon">
          <svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 7"/></svg>
        </div>
        <div class="confirm-header">
          <div class="confirm-eyebrow">Réservation confirmée</div>
          <h1 class="confirm-title">Merci, <em>${r.client_first_name}</em> !</h1>
          <p class="confirm-email">Votre contrat a été envoyé à<br><strong>${r.client_email}</strong></p>
        </div>
        <div class="details-box">
          <div class="details-label">Détails de la réservation</div>
          <div class="detail-row"><span class="key">Référence</span><span class="val ref">${ref}</span></div>
          <div class="detail-row"><span class="key">Véhicule</span><span class="val">${r.vehicles?.name || '—'}</span></div>
          <div class="detail-row"><span class="key">Client</span><span class="val">${r.client_first_name} ${r.client_last_name}</span></div>
          <div class="detail-row"><span class="key">Date de début</span><span class="val">${r.start_date}</span></div>
          <div class="detail-row"><span class="key">Date de fin</span><span class="val">${r.end_date}</span></div>
          ${r.meetup_points ? `<div class="detail-row"><span class="key">Point de rendez-vous</span><span class="val">${r.meetup_points.name}</span></div>` : ''}
          <div class="detail-row"><span class="key">Sous-total</span><span class="val">${subtotal.toFixed(2)} $</span></div>
          <div class="detail-row"><span class="key">TPS (5%)</span><span class="val">${tps.toFixed(2)} $</span></div>
          <div class="detail-row"><span class="key">TVQ (9.975%)</span><span class="val">${tvq.toFixed(2)} $</span></div>
          <div class="total-row">
            <span class="key">Total TTC</span>
            <div><span class="amount">${totalTTC.toFixed(2)}</span><span class="currency">$ CAD</span></div>
          </div>
        </div>
        <div class="confirm-actions">
          <a href="fleet.html" class="btn-primary"><span>Retour à la flotte</span></a>
          <a href="login.html" onclick="handleLogout(event)" class="btn-ghost">Se déconnecter</a>
        </div>`
    }

    async function handleLogout(e) {
      e.preventDefault()
      await db.auth.signOut()
      window.location.href = 'login.html'
    }

    loadConfirmation()
    </script>
</body>

</html>
