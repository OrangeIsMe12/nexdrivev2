<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexDrive — Mes Réservations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #050d1f;
            --navy2: #071430;
            --royal: #1440c8;
            --sky: #2d6ef5;
            --bright: #5b8fff;
            --white: #ffffff;
            --silver: rgba(240, 244, 255, 0.75);
            --muted: rgba(240, 244, 255, 0.45);
            --dim: rgba(240, 244, 255, 0.2);
            --glass: rgba(255, 255, 255, 0.04);
            --glass2: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --white-border: rgba(255, 255, 255, 0.16);
        }

        body {
            background: var(--navy);
            color: var(--silver);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 64px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5, 13, 31, 0.97);
            backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .nav-center { display: flex; align-items: center; gap: 32px; list-style: none; }
        .nav-center a {
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); text-decoration: none; transition: color 0.2s;
        }
        .nav-center a:hover, .nav-center a.active { color: var(--white); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-user { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
        .btn-nav {
            background: none; border: 1px solid var(--border);
            color: var(--silver); padding: 8px 18px;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .btn-nav:hover { border-color: var(--sky); color: var(--white); }

        /* PAGE HEADER */
        .page-header {
            padding: 140px 64px 60px;
            text-align: center;
            position: relative;
        }
        .page-header-glow {
            position: absolute;
            top: 80px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 300px;
            background: radial-gradient(ellipse, rgba(45, 110, 245, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .eyebrow {
            font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
            color: var(--sky); margin-bottom: 16px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 700; color: var(--white); line-height: 1.1;
        }
        .page-header h1 em { font-style: italic; color: var(--bright); }
        .page-header p {
            margin-top: 16px; font-size: 15px;
            color: var(--muted); max-width: 480px; margin-inline: auto;
        }

        /* CONTENT */
        .content { padding: 0 64px 120px; max-width: 1100px; margin: 0 auto; }

        /* STATS BAR */
        .stats-bar {
            display: flex; gap: 16px; margin-bottom: 48px; flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 160px;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px 24px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .stat-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
        .stat-value { font-size: 28px; font-weight: 600; color: var(--white); }
        .stat-sub { font-size: 11px; color: var(--dim); }

        /* RESERVATION CARDS */
        .reservations-list { display: flex; flex-direction: column; gap: 16px; }

        .resa-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 28px 32px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
            transition: border-color 0.2s;
        }
        .resa-card:hover { border-color: rgba(45, 110, 245, 0.3); }

        .resa-left { display: flex; flex-direction: column; gap: 12px; }

        .resa-header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

        .resa-vehicle {
            font-family: 'Playfair Display', serif;
            font-size: 20px; color: var(--white); font-weight: 700;
        }

        .resa-status {
            font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
            padding: 4px 12px; border: 1px solid;
        }
        .status-confirmed { color: #4cff8a; border-color: rgba(76, 255, 138, 0.3); background: rgba(76, 255, 138, 0.06); }
        .status-pending   { color: #ffc84d; border-color: rgba(255, 200, 77, 0.3);  background: rgba(255, 200, 77, 0.06); }
        .status-cancelled { color: #ff5b5b; border-color: rgba(255, 91, 91, 0.3);   background: rgba(255, 91, 91, 0.06); }
        .status-completed { color: var(--muted); border-color: var(--border);        background: var(--glass); }

        .resa-details { display: flex; gap: 32px; flex-wrap: wrap; }
        .resa-detail { display: flex; flex-direction: column; gap: 3px; }
        .resa-detail-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); }
        .resa-detail-value { font-size: 13px; color: var(--silver); }

        .resa-ref { font-size: 10px; color: var(--dim); letter-spacing: 2px; }

        .resa-right { text-align: right; display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
        .resa-price .amount { font-size: 26px; font-weight: 600; color: var(--white); }
        .resa-price .unit   { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }

        .btn-details {
            background: none; border: 1px solid var(--border);
            color: var(--muted); padding: 8px 18px;
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn-details:hover { border-color: var(--sky); color: var(--white); }

        /* EMPTY STATE */
        .empty {
            text-align: center; padding: 80px 32px;
            border: 1px solid var(--border); background: var(--glass);
        }
        .empty-icon { font-size: 48px; margin-bottom: 20px; opacity: 0.3; }
        .empty h3 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--white); margin-bottom: 10px; }
        .empty p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
        .btn-fleet {
            display: inline-block; background: var(--royal);
            color: var(--white); padding: 12px 32px;
            font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-fleet:hover { background: var(--sky); }

        /* LOADING */
        .loading { display: flex; justify-content: center; padding: 80px; gap: 8px; }
        .loading-dot {
            width: 6px; height: 6px;
            background: var(--sky); border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 24px 64px;
            display: flex; justify-content: space-between; align-items: center;
        }
        footer p { font-size: 11px; color: var(--dim); letter-spacing: 1px; }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .page-header { padding: 120px 20px 48px; }
            .content { padding: 0 20px 80px; }
            .resa-card { grid-template-columns: 1fr; }
            .resa-right { align-items: flex-start; text-align: left; }
            .nav-center { display: none; }
            footer { padding: 20px; flex-direction: column; gap: 8px; text-align: center; }
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="logo" style="display:flex;align-items:center;text-decoration:none;">
            <img src="nexdrive-logo-horizontal.svg" alt="NexDrive" style="height:45px;width:auto;" />
        </a>
        <ul class="nav-center">
            <li><a href="fleet.html">Flotte</a></li>
            <li><a href="mes-reservations.html" class="active">Mes réservations</a></li>
        </ul>
        <div class="nav-right">
            <span class="nav-user" id="nav-email"></span>
            <button class="btn-nav" onclick="handleLogout()">Déconnexion</button>
        </div>
    </nav>

    <div class="page-header">
        <div class="page-header-glow"></div>
        <div class="eyebrow">Espace client</div>
        <h1>Mes <em>réservations</em></h1>
        <p>Retrouvez l'historique et le statut de toutes vos réservations.</p>
    </div>

    <div class="content">
        <!-- Stats -->
        <div class="stats-bar" id="stats-bar" style="display:none;">
            <div class="stat-card">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-sub">réservations</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">En cours</div>
                <div class="stat-value" id="stat-active">0</div>
                <div class="stat-sub">confirmées</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Dépensé</div>
                <div class="stat-value" id="stat-total-spent">0$</div>
                <div class="stat-sub">CAD total</div>
            </div>
        </div>

        <!-- Liste -->
        <div id="reservations-container">
            <div class="loading">
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 NexDrive — Québec, Canada</p>
        <p>Tous droits réservés</p>
    </footer>

    <script>
        const { createClient } = supabase
        const db = createClient(
            'https://igftridkkchvjaxtburi.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZnRyaWRra2NodmpheHRidXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxMzgsImV4cCI6MjA4ODY2MzEzOH0.SuUO_seWElDPnm3lnGEEn8OwflJhbocyJjVF8nvrf4Y '
        )

        let currentUser = null

        async function init() {
            const { data: { session } } = await db.auth.getSession()
            if (!session) {
                window.location.href = 'login.html'
                return
            }
            currentUser = session.user
            const email = currentUser.email
            document.getElementById('nav-email').textContent =
                email.length > 22 ? email.slice(0, 20) + '…' : email

            await loadReservations()
        }

        async function loadReservations() {
            const container = document.getElementById('reservations-container')

            const { data: reservations, error } = await db
                .from('reservations')
                .select(`*, vehicles(name, category, images)`)
                .eq('client_email', currentUser.email)
                .order('created_at', { ascending: false })

            if (error) {
                container.innerHTML = `<div class="empty">
                    <div class="empty-icon">⚠️</div>
                    <h3>Erreur de chargement</h3>
                    <p>${error.message}</p>
                </div>`
                return
            }

            if (!reservations || reservations.length === 0) {
                container.innerHTML = `<div class="empty">
                    <div class="empty-icon">🚗</div>
                    <h3>Aucune réservation</h3>
                    <p>Vous n'avez pas encore de réservation. Parcourez notre flotte pour commencer.</p>
                    <a href="fleet.html" class="btn-fleet">Voir la flotte</a>
                </div>`
                return
            }

            // Stats
            const total = reservations.length
            const active = reservations.filter(r => r.status === 'confirmed' || r.status === 'pending').length
            const spent = reservations
                .filter(r => r.status !== 'cancelled')
                .reduce((sum, r) => sum + (Number(r.total_price) || 0), 0)

            document.getElementById('stat-total').textContent = total
            document.getElementById('stat-active').textContent = active
            document.getElementById('stat-total-spent').textContent = Math.round(spent) + '$'
            document.getElementById('stats-bar').style.display = 'flex'

            // Cards
            const list = document.createElement('div')
            list.className = 'reservations-list'

            reservations.forEach(r => {
                const vehicle = r.vehicles
                const vehicleName = vehicle?.name || 'Véhicule'
                const startDate = formatDate(r.start_date)
                const endDate = formatDate(r.end_date)
                const days = daysBetween(r.start_date, r.end_date)
                const status = r.status || 'pending'
                const ref = r.id ? r.id.slice(0, 8).toUpperCase() : '—'
                const price = r.total_price ? Number(r.total_price).toFixed(2) : '—'
                const statusLabel = {
                    'confirmed': 'Confirmée',
                    'pending':   'En attente',
                    'cancelled': 'Annulée',
                    'completed': 'Terminée'
                }[status] || status

                const card = document.createElement('div')
                card.className = 'resa-card'
                card.innerHTML = `
                    <div class="resa-left">
                        <div class="resa-header">
                            <div class="resa-vehicle">${vehicleName}</div>
                            <span class="resa-status status-${status}">${statusLabel}</span>
                        </div>
                        <div class="resa-details">
                            <div class="resa-detail">
                                <div class="resa-detail-label">Départ</div>
                                <div class="resa-detail-value">${startDate}</div>
                            </div>
                            <div class="resa-detail">
                                <div class="resa-detail-label">Retour</div>
                                <div class="resa-detail-value">${endDate}</div>
                            </div>
                            <div class="resa-detail">
                                <div class="resa-detail-label">Durée</div>
                                <div class="resa-detail-value">${days} jour${days > 1 ? 's' : ''}</div>
                            </div>
                            <div class="resa-detail">
                                <div class="resa-detail-label">Catégorie</div>
                                <div class="resa-detail-value">${vehicle?.category || '—'}</div>
                            </div>
                        </div>
                        <div class="resa-ref">Réf. #${ref}</div>
                    </div>
                    <div class="resa-right">
                        <div class="resa-price">
                            <div class="amount">${price}$</div>
                            <div class="unit">CAD total</div>
                        </div>
                        ${status !== 'cancelled' ? `<a href="confirmation.html?ref=${r.id}" class="btn-details">Détails</a>` : ''}
                    </div>
                `
                list.appendChild(card)
            })

            container.innerHTML = ''
            container.appendChild(list)
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—'
            const d = new Date(dateStr)
            return d.toLocaleDateString('fr-CA', { day: '2-digit', month: 'short', year: 'numeric' })
        }

        function daysBetween(start, end) {
            if (!start || !end) return 0
            const a = new Date(start)
            const b = new Date(end)
            return Math.max(1, Math.round((b - a) / (1000 * 60 * 60 * 24)))
        }

        async function handleLogout() {
            await db.auth.signOut()
            window.location.href = 'login.html'
        }

        init()
    </script>
</body>
</html>
